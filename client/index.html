<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12101b" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>"
    />
    <title>Vivid Realms</title>
    <!-- react-draggable (via react-grid-layout) reads process.env.DRAGGABLE_DEBUG
         at runtime during drags; the browser has no `process`, so without this
         shim the lookup throws "process is not defined" and drag/resize abort. -->
    <script>
      window.process = window.process || { env: {} };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
